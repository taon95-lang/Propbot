<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTCH SCOUT</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        button { width: 100%; padding: 15px; background: #facc15; color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        #loader { display: none; margin: 20px; }
    </style>
</head>
<body>
    <h1>⚡ BUTCH SCOUT</h1>
    <div class="card">
        <input type="text" id="pName" style="width: 80%; padding: 10px; margin-bottom: 10px;" placeholder="Player Name">
        <button onclick="go()">SCRAPE & GRADE</button>
    </div>
    <div id="loader">Processing...</div>
    <div id="results" style="display:none; margin-top:20px;">
        <h2 id="resGrade" style="font-size: 40px; color: #facc15;"></h2>
        <p id="resRec"></p>
    </div>

    <script>
        async function go() {
            const name = document.getElementById('pName').value;
            document.getElementById('loader').style.display = 'block';
            try {
                // Fixed URL with backticks for JavaScript
                const r = await fetch(`https://python-workspace-taon95.replit.dev/api/scrape?player=${name}`);
                const d = await r.json();
                document.getElementById('resGrade').innerText = d.final_grade;
                document.getElementById('resRec').innerText = d.bet_recommendation;
                document.getElementById('results').style.display = 'block';
            } catch (e) {
                alert("Connection Failed - Check if Replit is Running!");
            }
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
