<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Prop Grader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #ffffff; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, button { width: 100%; padding: 12px; box-sizing: border-box; margin-top: 10px; border-radius: 8px; border: none; font-size: 16px; }
        input { background: #2a2a2a; color: white; border: 1px solid #444; }
        button { background: #2481cc; color: white; font-weight: bold; cursor: pointer; }
        #grade { font-size: 1.2em; margin-top: 10px; font-weight: bold; }
        h2 { margin-bottom: 20px; border-left: 4px solid #2481cc; padding-left: 10px; }
    </style>
</head>
<body>
    <h2>📊 Prop Workspace</h2>
    
    <div class="card">
        <label>Player Name</label>
        <input type="text" id="player" placeholder="e.g. m0NESY">
        <button onclick="runSim()">Analyze Prop</button>
    </div>

    <div id="results" style="display:none;">
        <div class="card">
            <h3 id="display-name" style="margin-top:0; color:#2481cc;">---</h3>
            <div class="stat-grid">
                <div>Proj Kills: <span id="avg">0</span></div>
                <div>Hit Rate: <span id="hit">0%</span></div>
                <div>Edge: <span id="edge">0%</span></div>
            </div>
            <div id="grade">Grade: -/10</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function runSim() {
            const player = document.getElementById('player').value;
            if (!player) return alert("Please enter a player name");

            // --- Simulation Logic ---
            // Manual baseline for now (Maps 1-2)
            const line = 34.5; 
            const kpr = 0.77; 
            const rounds = 46; 
            const expected = kpr * rounds;

            // Monte Carlo: 100,000 simulations
            let overCount = 0;
            for (let i = 0; i < 100000; i++) {
                // Simulating round volatility
                let simResult = expected + (Math.random() - 0.5) * 14; 
                if (simResult > line) overCount++;
            }

            const hitPercent = (overCount / 1000).toFixed(1);
            const edgePercent = (hitPercent - 50).toFixed(1);

            // --- Update UI ---
            document.getElementById('results').style.display = 'block';
            document.getElementById('display-name').innerText = player.toUpperCase();
            document.getElementById('avg').innerText = expected.toFixed(1);
            document.getElementById('hit').innerText = hitPercent + "%";
            document.getElementById('edge').innerText = edgePercent + "%";
            
            const gradeText = document.getElementById('grade');
            if (hitPercent > 58) {
                gradeText.innerText = "Grade: 10/10 🔥 (MISPRICED)";
                gradeText.style.color = "#00ff00";
            } else if (hitPercent > 53) {
                gradeText.innerText = "Grade: 8/10 ✅ (STRONG PLAY)";
                gradeText.style.color = "#ccff00";
            } else {
                gradeText.innerText = "Grade: 5/10 🧊 (NO BET)";
                gradeText.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
