<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTCH | Real HLTV Scraper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e9eaeb; padding: 15px; margin: 0; }
        .card { background: #1e2329; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; }
        label { display: block; font-size: 11px; color: #848e9c; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; background: #2b3139; border: 1px solid #474d57; border-radius: 8px; color: white; margin-bottom: 10px; font-size: 16px; }
        button { width: 100%; padding: 16px; background: #f0b90b; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: #2b3139; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #474d57; }
        .stat-label { font-size: 10px; color: #848e9c; display: block; }
        .stat-val { font-size: 18px; font-weight: bold; color: #f0b90b; }
        .role-box { background: #1e2329; border: 1px dashed #f0b90b; color: #f0b90b; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 5px; min-height: 22px; font-size: 14px; text-transform: uppercase; }
        .intel-box { background: rgba(240, 185, 11, 0.05); border-left: 4px solid #f0b90b; padding: 12px; margin-top: 15px; font-size: 13px; color: #e9eaeb; line-height: 1.6; text-align: left; }
        #grade-box { font-size: 20px; font-weight: bold; text-align: center; margin-top: 15px; padding: 12px; border-radius: 8px; border: 2px solid #333; }
        .loading { display: none; text-align: center; color: #f0b90b; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b; margin-bottom:5px;">⚡ BUTCH SCOUT</h2>
    <p style="font-size:10px; color:#848e9c; margin:0 0 20px 0;">LIVE HLTV API SCRAPER | 100K SIM</p>

    <div class="card">
        <label>Player Name</label>
        <input type="text" id="player" placeholder="e.g. m0nesy">
        <label>Sportsbook Line (Maps 1-2)</label>
        <input type="number" id="line" step="0.5" placeholder="32.5">
        <label>Opponent Team</label>
        <input type="text" id="opponent" placeholder="e.g. FaZe">
        <button onclick="runLiveHLTVScout()">SCRAPE HLTV & GRADE</button>
    </div>

    <div id="loader" class="loading">SCRAPING HLTV DATA... (PLEASE WAIT 10-20 SECONDS)</div>

    <div id="results" style="display:none;">
        <div class="card">
            <h3 id="display-name" style="margin:0; color:#f0b90b; text-align:center;">---</h3>
            <p id="vs-text" style="text-align:center; font-size:12px; color:#848e9c; margin-top:4px; font-weight:bold;"></p>
            
            <div class="stat-grid">
                <div class="stat-item"><span class="stat-label">Exp. Kills</span><span class="stat-val" id="avg">0</span></div>
                <div class="stat-item"><span class="stat-label">Hit Rate</span><span class="stat-val" id="hit">0%</span></div>
                <div class="stat-item"><span class="stat-label">Proj Rounds</span><span class="stat-val" id="rounds">0</span></div>

                <div>
                    <div class="stat-item"><span class="stat-label">Edge vs Line</span><span class="stat-val" id="edge">0%</span></div>
                    <label style="text-align:center; margin-top:8px;">Player Role</label>
                    <div id="role-box" class="role-box">---</div>
                </div>
            </div>
            
            <div id="grade-box">---</div>
            
            <div class="intel-box">
                <strong style="color: #f0b90b;">📝 LIVE HLTV SCOUTING SUMMARY</strong><br>
                <div id="intel-details" style="margin-top:8px;">...</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function scrapeHLTV(playerName, apiKey) {
            const proxy = `https://api.scraperapi.com?api_key=${apiKey}&url=`;
            
            try {
                // Step 1: Search HLTV for the player to get their ID
                const searchUrl = `https://www.hltv.org/search?query=${encodeURIComponent(playerName)}`;
                let searchRes = await fetch(proxy + encodeURIComponent(searchUrl));
                let searchHtml = await searchRes.text();
                let doc = new DOMParser().parseFromString(searchHtml, 'text/html');
                
                // Extract the link to the player's profile
                let playerNode = doc.querySelector('a[href*="/player/"]');
                if (!playerNode) return null; // Player not found
                
                let playerPath = playerNode.getAttribute('href'); 
                let playerId = playerPath.split('/')[2];
                let pNameExtracted = playerPath.split('/')[3];
                
                // Step 2: Fetch their actual stats page (forcing recent 3 month data)
                const statsUrl = `https://www.hltv.org/stats/players/${playerId}/${pNameExtracted}?startDate=3months`;
                let statsRes = await fetch(proxy + encodeURIComponent(statsUrl));
                let statsHtml = await statsRes.text();
                let sDoc = new DOMParser().parseFromString(statsHtml, 'text/html');
                
                // Step 3: Parse the actual HTML for stats
                let kpr = 0.65; // Safe default
                let rating = 1.0;
                let hs = "40%";
                
                let statRows = sDoc.querySelectorAll('.stats-row');
                statRows.forEach(row => {
                    let label = row.querySelector('span:first-child')?.innerText || "";
                    let val = row.querySelector('span:nth-child(2)')?.innerText || "";
                    
                    if (label.includes("Kills / round")) kpr = parseFloat(val);
                    if (label.includes("Rating")) rating = parseFloat(val);
                    if (label.includes("Headshot %")) hs = val;
                });

                return { kpr, rating, hs, playerId };
            } catch (error) {
                console.error(error);
                return null;
            }
        }

        async function runLiveHLTVScout() {
            const pName = document.getElementById('player').value.trim();
            const oName = document.getElementById('opponent').value.trim();
            const line = parseFloat(document.getElementById('line').value);
            const apiKey = 'edbe782d55c18160580cdd672a3bf3c9'; // Your ScraperAPI Key

            if (!pName || !line || !oName) return alert("Fill all fields.");
            
            // Show loader, hide results
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            // Scrape Real Data
            // Fetch live data directly from your Replit Python API
                    // --- START OF FETCH AREA ---
        console.log("Calling Brain at:", `https://python-workspace-taon95.replit.app/api/scrape?player=${pName}`);
        
        try {
            // This is the actual call to your Replit server
            const response = await fetch(`https://python-workspace-taon95.replit.app/api/scrape?player=${pName}`);
            
            if (!response.ok) {
                throw new Error(`Server responded with status: ${response.status}`);
            }

            const hltvData = await response.json();
            console.log("Brain responded with:", hltvData);

            if (hltvData.error) {
                alert("Scraper Error: " + hltvData.error);
                return;
            }
            // --- END OF FETCH AREA ---




            if (!hltvData) {
                document.getElementById('loader').style.display = 'none';
                alert("Failed to find or scrape player from HLTV. Check spelling or try again.");
                return;
            }

            // Extract the real scraped variables
            let realKpr = hltvData.kpr;
            let realRating = hltvData.rating;
            let realHs = hltvData.hs;

            // 1. DYNAMIC LOGIC BASED ON REAL STATS
            let role = "STAR RIFLER";
            let roundProj = 43.5; // Default expected BO3 Maps 1-2 length
            
            // Role assignment based on real data & name patterns
            if (pName.toLowerCase().includes("910") || pName.toLowerCase().includes("phzy") || pName.toLowerCase().includes("yuramyata")) {
                role = "PRIMARY AWPER";
            } else if (realKpr > 0.74) {
                role = "ENTRY FRAGGER";
            } else if (realRating < 1.0) {
                role = "SUPPORT";
            } else {
                role = "STAR RIFLER";
            }

            // Generate Summary using the REAL scraped numbers
            const summary = `Data successfully scraped from HLTV. ${pName.toUpperCase()} currently holds a **${realRating} Rating** and a **${realHs} Headshot %** over the recent stat window. With a scraped KPR of **${realKpr}**, their statistical baseline is locked. Projected against ${oName.toUpperCase()} for ${roundProj} rounds on Maps 1-2, the engine compares their true real-world kill pace against the sportsbook line of ${line}.`;

            // 2. 100K MONTE CARLO USING SCRAPED KPR
            const expectedKills = realKpr * roundProj;
            let overs = 0;
            for (let i = 0; i < 100000; i++) {
                let u = Math.random(), v = Math.random();
                let norm = Math.sqrt(-2.0 * Math.log(u || 0.001)) * Math.cos(2.0 * Math.PI * v);
                let sim = expectedKills + (norm * 6.6); // CS2 Volatility
                if (sim > line) overs++;
            }
            const hitRate = (overs / 1000).toFixed(1);
            const verdict = hitRate > 50 ? "OVER" : "UNDER";
            const edgeValue = (hitRate - 50).toFixed(1);

            // 3. UI UPDATE
            document.getElementById('loader').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            document.getElementById('display-name').innerText = pName.toUpperCase();
            document.getElementById('vs-text').innerText = `VS ${oName.toUpperCase()}`;
            document.getElementById('role-box').innerText = role;
            
            document.getElementById('avg').innerText = expectedKills.toFixed(1);
            document.getElementById('hit').innerText = hitRate + "%";
            document.getElementById('rounds').innerText = roundProj.toFixed(1);
            document.getElementById('edge').innerText = edgeValue + "%";
            document.getElementById('intel-details').innerText = summary;

            // Grade Box
            const gradeBox = document.getElementById('grade-box');
            if (hitRate > 62) {
                gradeBox.innerText = `10/10 🔥 ELITE ${verdict}`;
                gradeBox.style.color = "#00ff00"; gradeBox.style.borderColor = "#00ff00";
            } else if (hitRate > 55) {
                gradeBox.innerText = `8/10 ✅ STRONG ${verdict}`;
                gradeBox.style.color = "#ccff00"; gradeBox.style.borderColor = "#ccff00";
            } else if (hitRate < 45) {
                gradeBox.innerText = `7/10 📉 LEAN ${verdict}`;
                gradeBox.style.color = "#ffaa00"; gradeBox.style.borderColor = "#ffaa00";
            } else {
                gradeBox.innerText = `5/10 🧊 NO BET (${verdict})`;
                gradeBox.style.color = "#ff4444"; gradeBox.style.borderColor = "#ff4444";
            }
        }
    </script>
</body>
</html>
