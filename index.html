<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTCH SCOUT</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #334155; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { width: 90%; padding: 15px; background: #facc15; color: black; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        #loader { display: none; margin: 20px; }
        #results { display: none; margin-top: 20px; background: #334155; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <h1>⚡ BUTCH SCOUT</h1>
    <div class="card">
        <input type="text" id="pName" placeholder="Enter Player Name">
        <button onclick="go()">SCRAPE & GRADE</button>
    </div>
    <div id="loader">Processing...</div>
    <div id="results">
        <h2 id="resGrade" style="font-size: 50px; color: #facc15;"></h2>
        <p id="resRec"></p>
    </div>

    <script>
        async function go() {
            const name = document.getElementById('pName').value;
            document.getElementById('loader').style.display = 'block';
            try {
                
                const r = await fetch(`https://python-workspace-taon95.replit.app/api/scrape?player=${name}`);
                const d = await r.json();
                document.getElementById('resGrade').innerText = d.final_grade;
                document.getElementById('resRec').innerText = d.bet_recommendation;
                document.getElementById('results').style.display = 'block';
            } catch (e) {
                alert("Connection failed! Check if Replit is RUNNING.");
            }
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
