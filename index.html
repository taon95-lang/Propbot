<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUTCH SCOUT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #facc15; --text: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { align-self: flex-start; margin-bottom: 20px; }
        .header h1 { color: var(--accent); font-size: 24px; margin: 0; display: flex; align-items: center; gap: 8px; }
        .header p { font-size: 10px; opacity: 0.6; margin: 5px 0; letter-spacing: 1px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; background: #334155; border: 1px solid #475569; border-radius: 8px; padding: 12px; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--accent); }
        button { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 16px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        #loader { display: none; text-align: center; margin-top: 20px; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(250, 204, 21, 0.2); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #results { margin-top: 20px; width: 100%; max-width: 400px; display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: #334155; padding: 12px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
        .grade-box { background: var(--accent); color: #000; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .grade-title { font-size: 12px; font-weight: 800; text-transform: uppercase; display: block; }
        .grade-value { font-size: 42px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ BUTCH SCOUT</h1>
        <p>LIVE HLTV API SCRAPER | 100K SIM</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Player Name</label>
            <input type="text" id="playerName" placeholder="e.g. m0nesy">
        </div>
        <div class="input-group">
            <label>Sportsbook Line (Maps 1-2)</label>
            <input type="number" id="line" step="0.5" placeholder="32.5">
        </div>
        <div class="input-group">
            <label>Opponent Team</label>
            <input type="text" id="opponent" placeholder="e.g. FaZe">
        </div>
        <button onclick="runLiveHLTVScout()">Scrape HLTV & Grade</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size: 12px; color: #94a3b8;">Scraping Detailed Stats & Running Simulation...</p>
    </div>

    <div id="results">
        <div class="grade-box">
            <span class="grade-title">Final Grade</span>
            <div class="grade-value" id="resGrade">-</div>
            <div id="resRec" style="font-weight: 800; margin-top: 5px;"></div>
        </div>
        
        <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">Hit Rate</span><div class="stat-value" id="resHit">-</div></div>
            <div class="stat-item"><span class="stat-label">Proj. Kills</span><div class="stat-value" id="resExp">-</div></div>
            <div class="stat-item"><span class="stat-label">Over %</span><div class="stat-value" id="resOver">-</div></div>
            <div class="stat-item"><span class="stat-label">Edge</span><div class="stat-value" id="resEdge">-</div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function runLiveHLTVScout() {
            const pName = document.getElementById('playerName').value;
            const oName = document.getElementById('opponent').value;
            const line = parseFloat(document.getElementById('line').value);

            if (!pName || !line || !oName) {
                return alert("Please fill all fields!");
            }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            try {
                // Pointing to your Replit .dev link
                const response = await fetch(`https://api-server--tavonwebb.repl.co/api/scrape?player=${pName}`);
                
                if (!response.ok) throw new Error('Scraper is offline');

                const data = await response.json();

                if (data.error) {
                    alert("Error: " + data.error);
                    document.getElementById('loader').style.display = 'none';
                    return;
                }

                // Logic for Grading
                const expKills = data.simulated_mean || data.recent_average;
                const overProb = data.over_probability || 50;
                const edge = (overProb - 50).toFixed(1);
                
                document.getElementById('resGrade').innerText = data.final_grade || "7/10";
                document.getElementById('resRec').innerText = data.bet_recommendation || "LEAN OVER";
                document.getElementById('resHit').innerText = (data.hit_rate * 100).toFixed(0) + "%";
                document.getElementById('resExp').innerText = expKills.toFixed(1);
                document.getElementById('resOver').innerText = overProb.toFixed(0) + "%";
                document.getElementById('resEdge').innerText = edge + "%";

                document.getElementById('loader').style.display = 'none';
                document.getElementById('results').style.display = 'block';

            } catch (err) {
                console.error(err);
                alert("Connection failed. Make sure Replit is RUNNING!");
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
