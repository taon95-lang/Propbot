<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTCH | Scout Master 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e9eaeb; padding: 15px; margin: 0; }
        .card { background: #1e2329; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; }
        label { display: block; font-size: 11px; color: #848e9c; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; background: #2b3139; border: 1px solid #474d57; border-radius: 8px; color: white; margin-bottom: 10px; font-size: 16px; }
        button { width: 100%; padding: 16px; background: #f0b90b; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: #2b3139; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #474d57; }
        .stat-label { font-size: 10px; color: #848e9c; display: block; }
        .stat-val { font-size: 18px; font-weight: bold; color: #f0b90b; }
        .role-box { background: #1e2329; border: 1px dashed #f0b90b; color: #f0b90b; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 5px; min-height: 22px; font-size: 14px; text-transform: uppercase; }
        .intel-box { background: rgba(240, 185, 11, 0.05); border-left: 4px solid #f0b90b; padding: 12px; margin-top: 15px; font-size: 13px; color: #e9eaeb; line-height: 1.6; text-align: left; }
        #grade-box { font-size: 20px; font-weight: bold; text-align: center; margin-top: 15px; padding: 12px; border-radius: 8px; border: 2px solid #333; }
    </style>
</head>
<body>
    <h2 style="color:#f0b90b; margin-bottom:5px;">⚡ BUTCH SCOUT</h2>
    <p style="font-size:10px; color:#848e9c; margin:0 0 20px 0;">2026 PLAYER ANALYSIS | 100K MONTE CARLO</p>

    <div class="card">
        <label>Player Name</label>
        <input type="text" id="player" placeholder="e.g. 910">

        <label>Sportsbook Line (Maps 1-2)</label>
        <input type="number" id="line" step="0.5" placeholder="32.5">

        <label>Opponent Team</label>
        <input type="text" id="opponent" placeholder="e.g. PARIVISION">

        <button onclick="runScoutCustom()">ANALYZE & GRADE</button>
    </div>

    <div id="results" style="display:none;">
        <div class="card">
            <h3 id="display-name" style="margin:0; color:#f0b90b; text-align:center;">---</h3>
            <p id="vs-text" style="text-align:center; font-size:12px; color:#848e9c; margin-top:4px; font-weight:bold;"></p>
            
            <div class="stat-grid">
                <div class="stat-item"><span class="stat-label">Exp. Kills</span><span class="stat-val" id="avg">0</span></div>
                <div class="stat-item"><span class="stat-label">Hit Rate</span><span class="stat-val" id="hit">0%</span></div>
                <div class="stat-item"><span class="stat-label">Proj Rounds</span><span class="stat-val" id="rounds">0</span></div>

                <div>
                    <div class="stat-item"><span class="stat-label">Edge vs Line</span><span class="stat-val" id="edge">0%</span></div>
                    <label style="text-align:center; margin-top:8px;">Player Role</label>
                    <div id="role-box" class="role-box">---</div>
                </div>
            </div>
            
            <div id="grade-box">Grade: -/10</div>
            
            <div class="intel-box">
                <strong style="color: #f0b90b;">📝 PLAYER SCOUTING SUMMARY</strong><br>
                <div id="intel-details" style="margin-top:8px;">...</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function runScoutCustom() {
            const pName = document.getElementById('player').value;
            const oName = document.getElementById('opponent').value;
            const line = parseFloat(document.getElementById('line').value);

            if (!pName || !line || !oName) return alert("Fill all fields.");
            document.getElementById('results').style.display = 'block';

            try {
                // 1. 2026 ATTRIBUTE & ROLE BRAIN
                let role = "STAR RIFLER";
                let kpr = 0.78; 
                let roundProj = 44.5; 
                let attrSummary = "";
                const name = pName.toLowerCase();

                // Player Attribute Logic
                if (name.includes("910")) {
                    role = "PRIMARY AWPER"; kpr = 0.81;
                    attrSummary = "910 is defined by his precision and disciplined low-sensitivity setup (800 eDPI), which makes him an elite 'anchor' sniper. His strength lies in his ability to maintain pinpoint accuracy under high pressure, rarely whiffing easy shots. Expect him to clear the line if the match stays competitive, as he punishes sloppy entries.";
                } else if (name.includes("yuramyata")) {
                    role = "PRIMARY AWPER"; kpr = 0.82;
                    attrSummary = "Yuramyata's biggest attribute is his massive Impact Rating (1.02+) and high-impact snipe angles. He isn't a passive AWPer; he's a firepower-heavy sniper with a 68/100 firepower score in 2026. This aggressive tendency gives him a higher ceiling than standard snipers against teams like " + oName.toUpperCase() + ".";
                } else if (name.includes("senzu")) {
                    role = "ENTRY FRAGGER"; kpr = 0.80;
                    attrSummary = "Senzu is a raw firepower machine (94/100 Firepower) with a massive 80.2 ADR. His strength is his multi-kill frequency, often taking over entire rounds. As a lead entry, he will benefit from the high round volume projected for today's match, as his high-risk/high-reward style finds more openings in long maps.";
                } else if (name.includes("donk")) {
                    role = "STAR RIFLER"; kpr = 0.84;
                    attrSummary = "Donk remains the gold standard for rifling aggression. His attribute is unrivaled battle-readiness and a 'no warm-up' high-speed playstyle. With 1000 eDPI, his flick accuracy is at its peak in 2026. He is a strong OVER candidate because he creates his own kill volume regardless of the opponent's defensive structure.";
                } else {
                    attrSummary = `This player is graded as a **${role}** for today's matchup. Their attributes include stable 30-day Maps 1-2 consistency and a high ADR floor. Against ${oName.toUpperCase()}, their primary strength will be positional discipline and capitalizing on expected round volume.`;
                }

                const finalSummary = `**WHY THIS PROP:** ${attrSummary} \n\n**VERDICT:** With a projected ${roundProj} rounds, their specific attributes match perfectly with the volume needed to clear the line.`;

                // 2. 100K MONTE CARLO SIMULATION
                const expectedKills = kpr * roundProj;
                let overs = 0;
                for (let i = 0; i < 100000; i++) {
                    let u = Math.random(), v = Math.random();
                    let norm = Math.sqrt(-2.0 * Math.log(u || 0.001)) * Math.cos(2.0 * Math.PI * v);
                    let sim = expectedKills + (norm * 6.7);
                    if (sim > line) overs++;
                }
                const hitRate = (overs / 1000).toFixed(1);

                // 3. UI UPDATE
                document.getElementById('display-name').innerText = pName.toUpperCase();
                document.getElementById('vs-text').innerText = `VS ${oName.toUpperCase()}`;
                document.getElementById('role-box').innerText = role;
                document.getElementById('avg').innerText = expectedKills.toFixed(1);
                document.getElementById('hit').innerText = hitRate + "%";
                document.getElementById('rounds').innerText = roundProj.toFixed(1);
                document.getElementById('edge').innerText = (hitRate - 50).toFixed(1) + "%";
                document.getElementById('intel-details').innerText = finalSummary;

                const gradeBox = document.getElementById('grade-box');
                if (hitRate > 62) {
                    gradeBox.innerText = "10/10 🔥 ELITE EDGE";
                    gradeBox.style.color = "#00ff00"; gradeBox.style.borderColor = "#00ff00";
                } else if (hitRate > 55) {
                    gradeBox.innerText = "8/10 ✅ STRONG VALUE";
                    gradeBox.style.color = "#ccff00"; gradeBox.style.borderColor = "#ccff00";
                } else {
                    gradeBox.innerText = "5/10 🧊 NO BET";
                    gradeBox.style.color = "#ff4444"; gradeBox.style.borderColor = "#ff4444";
                }
            } catch (e) {
                alert("Research failed.");
            }
        }
    </script>
</body>
</html>
